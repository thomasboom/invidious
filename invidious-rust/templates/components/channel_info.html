{% if channel.banner %}
<div class="h-box">
    <img style="width:100%" src="{{ channel.banner_thumbnails[0].url }}" alt="" />
</div>

<div class="h-box">
    <hr>
</div>
{% endif %}

<div class="pure-g h-box flexible title">
    <div class="pure-u-1-2 flex-left flexible">
        <div class="channel-profile">
            {% if channel.author_thumbnails %}
            <img src="{{ channel.author_thumbnails[0].url }}" alt="" />
            {% endif %}
            <div class="channel-name-pronouns">
                <span class="channel-name">{{ channel.display_name }}</span>{% if channel.is_verified %}&nbsp;<i class="icon ion ion-md-checkmark-circle"></i>{% endif %}
            </div>
        </div>
    </div>

    <div class="pure-u-1-2 flex-right flexible button-container">
        <div class="pure-u">
            <button class="pure-button pure-button-primary subscribe-button" data-channel-id="{{ channel.id }}">
                Subscribe
            </button>
        </div>

        <div class="pure-u">
            <a class="pure-button pure-button-secondary" dir="auto" href="/feed/channel/{{ channel.id }}">
                <i class="icon ion-logo-rss"></i>&nbsp;RSS
            </a>
        </div>
    </div>
</div>

<div class="h-box">
    <div id="descriptionWrapper"><p><span style="white-space:pre-wrap">{{ channel.description }}</span></p></div>
</div>

<div class="pure-g h-box">
    <div class="pure-u-1-2">
        <div class="pure-u-1 pure-md-1-3">
            <a href="https://www.youtube.com/channel/{{ channel.id }}">View channel on YouTube</a>
        </div>
        <div class="pure-u-1 pure-md-1-3">
            <a href="/">Switch Invidious Instance</a>
        </div>

        <div class="pure-u-1 pure-md-1-3">
            <a href="/channel/{{ channel.id }}">Videos</a>
        </div>
        <div class="pure-u-1 pure-md-1-3">
            <a href="/channel/{{ channel.id }}/shorts">Shorts</a>
        </div>
        <div class="pure-u-1 pure-md-1-3">
            <a href="/channel/{{ channel.id }}/playlists">Playlists</a>
        </div>
    </div>
    <div class="pure-u-1-2">
        <div class="pure-g" style="text-align:right">
            <div class="pure-u-1 pure-md-1-3">
                <b>Popular</b>
            </div>
            <div class="pure-u-1 pure-md-1-3">
                <a href="/channel/{{ channel.id }}?sort=oldest">Oldest</a>
            </div>
            <div class="pure-u-1 pure-md-1-3">
                <a href="/channel/{{ channel.id }}?sort=last">Last</a>
            </div>
        </div>
    </div>
</div>
