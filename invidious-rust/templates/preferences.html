{% extends "base.html" %}

{% block header %}
<title>Preferences - Invidious</title>
{% endblock header %}

{% block content %}
<div class="h-box">
    <h1>Preferences</h1>
</div>

<div class="pure-g">
    <div class="pure-u-1 pure-u-md-1-2">
        <div class="h-box">
            <form action="/preferences" method="post" class="pure-form pure-form-stacked">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <fieldset>
                    <legend>Appearance</legend>

                    <div class="pure-control-group">
                        <label for="dark_mode">Theme</label>
                        <select name="dark_mode" id="dark_mode">
                            <option value="" {% if preferences.dark_mode == "" %}selected{% endif %}>Light</option>
                            <option value="dark" {% if preferences.dark_mode == "dark" %}selected{% endif %}>Dark</option>
                            <option value="dark" {% if preferences.dark_mode == "dark" %}selected{% endif %}>System</option>
                        </select>
                    </div>

                    <div class="pure-control-group">
                        <label for="locale">Language</label>
                        <select name="locale" id="locale">
                            <option value="en-US" {% if preferences.locale == "en-US" %}selected{% endif %}>English (US)</option>
                            <option value="en-GB" {% if preferences.locale == "en-GB" %}selected{% endif %}>English (UK)</option>
                        </select>
                    </div>

                    <div class="pure-control-group">
                        <label for="region">Region</label>
                        <select name="region" id="region">
                            <option value="US" {% if preferences.region == "US" %}selected{% endif %}>United States</option>
                            <option value="GB" {% if preferences.region == "GB" %}selected{% endif %}>United Kingdom</option>
                        </select>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Video</legend>

                    <div class="pure-control-group">
                        <label for="quality">Quality</label>
                        <select name="quality" id="quality">
                            <option value="dash" {% if preferences.quality == "dash" %}selected{% endif %}>DASH (auto)</option>
                            <option value="hd1080" {% if preferences.quality == "hd1080" %}selected{% endif %}>1080p</option>
                            <option value="hd720" {% if preferences.quality == "hd720" %}selected{% endif %}>720p</option>
                            <option value="large" {% if preferences.quality == "large" %}selected{% endif %}>480p</option>
                            <option value="medium" {% if preferences.quality == "medium" %}selected{% endif %}>360p</option>
                            <option value="small" {% if preferences.quality == "small" %}selected{% endif %}>240p</option>
                            <option value="tiny" {% if preferences.quality == "tiny" %}selected{% endif %}>144p</option>
                        </select>
                    </div>

                    <div class="pure-control-group">
                        <label for="autoplay">Autoplay</label>
                        <input type="checkbox" name="autoplay" id="autoplay" {% if preferences.autoplay %}checked{% endif %}>
                    </div>

                    <div class="pure-control-group">
                        <label for="continue_autoplay">Continue autoplay</label>
                        <input type="checkbox" name="continue_autoplay" id="continue_autoplay" {% if preferences.continue_autoplay %}checked{% endif %}>
                    </div>

                    <div class="pure-control-group">
                        <label for="preload">Preload video</label>
                        <input type="checkbox" name="preload" id="preload" {% if preferences.preload %}checked{% endif %}>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Content</legend>

                    <div class="pure-control-group">
                        <label for="comments">Comments</label>
                        <select name="comments" id="comments">
                            <option value="youtube">YouTube</option>
                            <option value="">Disabled</option>
                        </select>
                    </div>

                    <div class="pure-control-group">
                        <label for="related_videos">Related videos</label>
                        <input type="checkbox" name="related_videos" id="related_videos" {% if preferences.related_videos %}checked{% endif %}>
                    </div>

                    <div class="pure-control-group">
                        <label for="thin_mode">Thin mode</label>
                        <input type="checkbox" name="thin_mode" id="thin_mode" {% if preferences.thin_mode %}checked{% endif %}>
                    </div>
                </fieldset>

                <div class="pure-controls">
                    <button type="submit" class="pure-button pure-button-primary">Save preferences</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
